name: Regenerate

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # 2026.07.20.1

      - name: Set up Ruby
        uses: Homebrew/actions/setup-ruby@df4b09108a1de9d6f995fe68f302b3f68bd6d2ef # 2026.07.20.1

      - name: Run tests
        run: rake test

      - name: Build Repology index
        run: rake repology:build

      - name: Regenerate advisories
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_FROM_API: "1"
          HOMEBREW_DEVELOPER: "1"
        run: brew generate-vulns-advisories advisories

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: regenerate-advisories
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add advisories/ data/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          gh auth setup-git --hostname github.com --force
          git checkout -b "$BRANCH"
          git commit -m "Regenerate advisories"
          git push --force origin "HEAD:refs/heads/$BRANCH"
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "PR already open."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "Regenerate advisories" \
              --body "Automated regeneration via \`brew generate-vulns-advisories\`."
          fi
