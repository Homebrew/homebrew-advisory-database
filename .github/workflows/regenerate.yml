name: Regenerate

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Set up Ruby
        uses: Homebrew/actions/setup-ruby@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Run tests
        run: rake test

      - name: Build Repology index
        run: rake repology:build

      - name: Regenerate advisories
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_FROM_API: "1"
          HOMEBREW_DEVELOPER: "1"
        run: brew generate-vulns-advisories advisories

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: regenerate-advisories
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add advisories/ data/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git checkout -b "$BRANCH"
          git commit -m "Regenerate advisories"
          git push --force origin "HEAD:refs/heads/$BRANCH"
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already open."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "Regenerate advisories" \
              --body "Automated regeneration via \`brew generate-vulns-advisories\`."
          fi
